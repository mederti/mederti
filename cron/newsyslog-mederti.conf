# Mederti log rotation — macOS newsyslog format
# =============================================================================
# Closes audit FINDING-D2-03: logs/cron.log grows unbounded (was 538 MB by the
# time of the audit). Install on the Mac that runs the cron scrapers; rotation
# happens automatically at next newsyslog invocation (~daily by launchd).
#
# Install (system-wide, needs sudo, recommended):
#   sudo cp cron/newsyslog-mederti.conf /etc/newsyslog.d/mederti.conf
#   sudo newsyslog -F   # force-rotate now to validate
#
# Or test the config in place without installing:
#   sudo newsyslog -F -nv -f cron/newsyslog-mederti.conf
#     -F = force regardless of size, -n = no-op, -v = verbose
#
# To uninstall:
#   sudo rm /etc/newsyslog.d/mederti.conf
#
# Columns:
#   logfile           — full path; supports glob via newsyslog's expansion
#   owner:group       — must match real file ownership or rotation silently fails
#   mode              — file mode after rotation
#   count             — how many rotated copies to keep
#   size              — rotate when file exceeds this (KB); * = no size trigger
#   when              — time trigger; $D1 = daily at 01:00 local
#   flags             — G = gzip rotated files; Z = compress with gzip (same)
#                       J = compress with bzip2; B = treat as binary (skip header)
#                       C = create if missing
#
# Format reference: `man 5 newsyslog.conf`
# =============================================================================

# logfilename                                                 [owner:group]            mode  count   size  when   flags
/Users/findlaysingapore/mederti/logs/cron.log                 findlaysingapore:staff   640   7       50000 $D1    GZC
/Users/findlaysingapore/mederti/logs/scraper_*.log            findlaysingapore:staff   640   14      50000 $D1    GZ
